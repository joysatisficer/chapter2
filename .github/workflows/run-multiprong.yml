on: [push]
jobs:
  Run-multiprong:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]
        poetry-version: [ "1.7.1" ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        uses: abatilo/actions-poetry@v2
      - name: Install custom dependencies
        run: |
          mkdir ../modules
          git clone https://github.com/CrazyPython/intermodel ../intermodel
          git clone https://github.com/CrazyPython/embedapi ../modules/embedapi
      - name: Install the project dependencies
        run: poetry install
      - name: Set secrets
        run: |
          while IFS='=' read -r -d '' n v; do
              prefix="ch2_"
              if [[ $n == $prefix* ]] ;
              then
                 key=${n#"$prefix"}
                 printf "%s: %s\n" "$key" "$v"
              fi
          done < <(env -0)
      - name: Run multiprong
        run: poetry run python3 chapter2/main.py multiprong

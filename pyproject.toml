[tool.poetry]
name = "chapter2"
version = "0.1.0"
description = ""
authors = ["Your Name <you@example.com>"]
readme = "README.md"
packages = [{include = "chapter2"}, { include = "*", from="chapter2"}]

[tool.poetry.dependencies]
python =  ">=3.11,<4.0"
"discord.py" = "*"
openai = "*"
tiktoken = ">=0.5.2"
more-itertools = "*"
aioitertools = "*"
pyvespa = "*"
nltk = "*"
pyyaml = "*"
python-dotenv = "*"
pydantic = ">=2.0a1"
intermodel = {path = "../intermodel"}
thundersvm-cpu = "^0.3.3"
streamlit = "^1.24.0"
scikit-learn = "^1.2.2"
structlog = "^23.1.0"
pytest-structlog = "^0.6"
fire = "^0.5.0"
rich = "^13.5.1"
faiss-cpu = "^1.7.4"
anthropic = "0.2.10"
asgiref = "^3.7.2"
python-dateutil = "^2.8.2"
pytest-asyncio = "^0.21.1"
asyncstdlib = "^3.10.9"
embedapi = {path = "../modules/embedapi"}
fastapi = {extras = ["all"], version = "^0.104.1"}
arrow = "^1.3.0"
httpx = "^0.25.2"
aiohttp = "^3.9.1"
metaphor-python = {url = "https://github.com/ampdot-io/metaphor-python/archive/async.zip"}
lmql = "^0.7.3"
mikoto-py = "^0.0.6"
exa-py = "^1.0.7"
sentry-sdk = {extras = ["fastapi"], version = "^1.40.5"}
novelai-api = "^0.23.1"


[tool.poetry.group.dev.dependencies]
black = "*"
pre-commit = "*"
streamlit = "*"
pytest = "*"
snakeviz = "^2.2.0"
pyre-check = "^0.9.18"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning:faiss.*",
    "ignore::DeprecationWarning:distutils.*"
]
asyncio_mode = "auto"
